<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audio Detector Stats</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="stats-page">
    <div class="shell shell-wide">
      <div class="header">
        <h1>Detection Stats</h1>
        <div class="header-actions">
          <nav class="top-nav" aria-label="Primary">
            <a class="top-nav-link" href="index.html">Detector</a>
            <a class="top-nav-link active" href="stats.html">Stats</a>
          </nav>
          <label class="toggle-wrap">
            Dark
            <label class="toggle">
              <input type="checkbox" id="darkSetting">
              <span class="toggle-slider"></span>
            </label>
          </label>
        </div>
      </div>

      <div class="user-bar">
        <span class="user-bar-email" id="userEmail">Checking sign-in…</span>
        <div class="user-bar-actions">
          <a class="btn-sign-out stats-back-link" href="index.html">Back to Detector</a>
          <button class="btn-sign-out" id="signOutBtn">Sign out</button>
        </div>
      </div>

      <div class="filter-row" role="tablist" aria-label="Date filters">
        <button class="filter-btn active" data-days="1">1d</button>
        <button class="filter-btn" data-days="7">7d</button>
        <button class="filter-btn" data-days="30">30d</button>
      </div>

      <div class="stats-loading" id="loadingState">
        <div class="spinner"></div>
        <div>Loading detections…</div>
      </div>

      <div class="stats-empty" id="emptyState" hidden>No detections in this period</div>

      <div class="stats-content" id="statsContent" hidden>
        <div class="chart-card">
          <div class="chart-title">Top sounds by frequency</div>
          <div class="chart-wrap bar-wrap">
            <canvas id="barChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Detection timeline by hour</div>
          <div class="chart-subtitle">Dot size scales with confidence</div>
          <div class="chart-wrap scatter-wrap">
            <canvas id="scatterChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Summary</div>
          <div class="table-wrap">
            <table class="summary-table">
              <thead>
                <tr>
                  <th>Sound Label</th>
                  <th>Count</th>
                  <th>Last Detected</th>
                  <th>Avg Confidence</th>
                </tr>
              </thead>
              <tbody id="summaryTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script type="module" src="stats.js"></script>
</body>
</html>
